# Copy this file to secrets.yaml in this folder and fill in real values.
# DO NOT commit secrets.yaml - the secrets/ folder is gitignored (except this example).
# Sync secrets via a secure private channel (rsync, 1Password, etc.).
#
# servers:
#   <server_id>:              # Must match server id in servers.yaml exactly (no fallback)
#     env:                    # API keys, bearer tokens - injected into client configs
#       API_KEY: "actual-value"
#       BEARER_TOKEN: "actual-value"
#     auth:                   # For Cursor OAuth static credentials (CLIENT_ID, CLIENT_SECRET)
#       CLIENT_ID: "..."
#       CLIENT_SECRET: "..."
#   fetch: {}                 # Use {} for servers that need no secrets

servers:
  context7:
    env:
      CONTEXT7_API_KEY: ""
  fetch: {}
  playwright: {}
  exa:
    env:
      EXA_API_KEY: ""
  google-workspace-perso:
    env:
      GOOGLE_OAUTH_CLIENT_ID: ""
      GOOGLE_OAUTH_CLIENT_SECRET: ""
  google-workspace-pro:
    env:
      GOOGLE_OAUTH_CLIENT_ID: ""
      GOOGLE_OAUTH_CLIENT_SECRET: ""
  google-maps-grounding-lite:
    oauth:
      clientId: ""
      clientSecret: ""
