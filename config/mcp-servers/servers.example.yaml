# Copy this file to servers.yaml in this folder and customize.
# DO NOT commit servers.yaml - it is gitignored.
#
# Secrets: Use .env.tpl at repo root. Values with op:// refs are resolved via 1Password.
# In server env: use "${VAR_NAME}" to reference .env.tpl variables.
#
# Top-level keys:
#   global.instructions  - MCP selection guidance (e.g. which Google Workspace to use).
#                          Synced to Codex developer_instructions, Cursor rules, Gemini GEMINI.md.
#   servers.<id>         - One entry per MCP server.
#
# Per-server options:
#   method: stdio | http | sse
#   command, args        - For stdio: command to run (e.g. npx, python, uvx).
#   url, httpUrl         - For http/sse: server URL. Use httpUrl for Gemini OAuth.
#   enabled: true|false  - Default: true.
#   clients: [codex, cursor, gemini] - Restrict to specific clients. Omit = all.
#   description         - Helps LLM choose the right server (Gemini supports this).
#   trust: true         - Cursor/Gemini: auto-approve tools without prompting.
#   timeout              - Startup/tool timeout (seconds or "30s").
#   env                  - Env vars for the process. Use "${VAR}" for .env.tpl values.
#   oauth.enabled: true  - For HTTP servers with OAuth (e.g. google-maps-grounding-lite).
#   oauth.clientId, clientSecret, scopes - From env or inline. Use "${VAR}" for secrets.
#   bearer_token_env_var - Codex only. Env var name for bearer token; exported to ~/.codex/mcp.env.

global:
  instructions: >
    When the user refers to work email, work calendar, shared drives, or professional Google services, use the google-workspace-pro MCP server.
    When the user refers to personal email, personal calendar, private files, or personal Google services, use the google-workspace-perso MCP server.

servers:
  context7:
    method: stdio
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
    enabled: true
    timeout: 30
    env:
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"

  fetch:
    method: stdio
    command: python
    args: ["-m", "mcp_server_fetch"]
    enabled: true

  playwright:
    method: stdio
    command: npx
    args: ["-y", "@playwright/mcp@latest"]
    enabled: true
    timeout: 30

  exa:
    method: http
    url: https://mcp.exa.ai/mcp
    httpUrl: https://mcp.exa.ai/mcp
    enabled: true
    env:
      EXA_API_KEY: "${EXA_API_KEY}"

  google-workspace-perso:
    method: stdio
    command: uvx
    args:
      [
        "--from",
        "workspace-mcp",
        "workspace-mcp",
        "--transport",
        "stdio",
        "--tools",
        "gmail",
        "calendar",
        "--tool-tier",
        "core",
      ]
    enabled: true
    trust: true
    timeout: 30
    env:
      WORKSPACE_MCP_PORT: "8010"
      WORKSPACE_MCP_CREDENTIALS_DIR: "~/.google_workspace_mcp/credentials-perso"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID_PERSO}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET_PERSO}"

  google-workspace-pro:
    method: stdio
    command: uvx
    args:
      [
        "--from",
        "workspace-mcp",
        "workspace-mcp",
        "--transport",
        "stdio",
        "--tools",
        "gmail",
        "calendar",
        "--tool-tier",
        "core",
      ]
    enabled: true
    trust: true
    timeout: 30
    env:
      WORKSPACE_MCP_PORT: "8012"
      WORKSPACE_MCP_CREDENTIALS_DIR: "~/.google_workspace_mcp/credentials-pro"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID_PRO}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET_PRO}"

  google-maps-grounding-lite:
    method: http
    httpUrl: https://mapstools.googleapis.com/mcp
    enabled: true
    oauth:
      enabled: true
      clientId: "${GOOGLE_MAPS_GROUNDING_LITE_CLIENT_ID}"
      clientSecret: "${GOOGLE_MAPS_GROUNDING_LITE_CLIENT_SECRET}"
      scopes:
        - https://www.googleapis.com/auth/cloud-platform
